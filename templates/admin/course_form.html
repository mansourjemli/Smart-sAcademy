{% extends "base.html" %}
{% block title %}{% if course %}Modifier{% else %}Ajouter{% endif %} un cours{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <a href="{{ url_for('admin_dashboard') }}" class="text-indigo-600 hover:text-indigo-700 mb-4 inline-block"><i class="fas fa-arrow-left mr-2"></i>Retour à l'administration</a>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">{% if course %}Modifier le cours{% else %}Ajouter un nouveau cours{% endif %}</h1>
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Titre *</label>
                    <input type="text" name="title" value="{{ course.title if course else '' }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                    <select name="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        <option value="">Sélectionner...</option>
                        <option value="Cours" {% if course and course.category == 'Cours' %}selected{% endif %}>Cours</option>
                        <option value="Série d'exercices" {% if course and course.category == "Série d'exercices" %}selected{% endif %}>Série d'exercices</option>
                        <option value="Examen" {% if course and course.category == 'Examen' %}selected{% endif %}>Examen</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Niveau</label>
                    <select name="level" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        <option value="Première année" {% if course and course.level == 'Première année' %}selected{% endif %}>Première année</option>
                        <option value="Deuxième Sciences" {% if course and course.level == 'Deuxième Sciences' %}selected{% endif %}>Deuxième Sciences</option>
                        <option value="Deuxième Info" {% if course and course.level == 'Deuxième Info' %}selected{% endif %}>Deuxième Info</option>
                        <option value="Troisième Math+Sc+Tech" {% if course and course.level == 'Troisième Math+Sc+Tech' %}selected{% endif %}>Troisième Math+Sc+Tech</option>
                        <option value="Troisième Info" {% if course and course.level == 'Troisième Info' %}selected{% endif %}>Troisième Info</option>
                        <option value="BAC Math+Sc+Tech" {% if course and course.level == 'BAC Math+Sc+Tech' %}selected{% endif %}>BAC Math+Sc+Tech</option>
                        <option value="BAC Info" {% if course and course.level == 'BAC Info' %}selected{% endif %}>BAC Info</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Prix (dt)</label>
                    <input type="number" step="0.01" name="price" value="{{ course.price if course else '0' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Formateur</label>
                    <input type="text" name="instructor" value="{{ course.instructor if course else 'Formateur' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">URL de l'image</label>
                    <input type="url" name="image_url" value="{{ course.image_url if course else '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description courte</label>
                <input type="text" name="short_description" value="{{ course.short_description if course else '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description complète</label>
                <textarea name="description" rows="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">{{ course.description if course else '' }}</textarea>
            </div>
            <div class="flex items-center">
                <input type="checkbox" name="is_published" id="is_published" {% if course and course.is_published %}checked{% endif %} class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                <label for="is_published" class="ml-2 text-sm text-gray-700">Publier le cours</label>
            </div>
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700">
                {% if course %}Mettre à jour{% else %}Créer le cours{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
